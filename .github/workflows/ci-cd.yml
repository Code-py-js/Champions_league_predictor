name: CI-CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"
  workflow_dispatch:

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI - Lint, Test, Smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install streamlit

      - name: Compile check
        run: |
          python -m compileall -q src tests app.py main.py run_extraction.py

      - name: Run unit and component tests
        run: |
          pytest -q tests \
            --ignore=tests/test_integration_api.py \
            --ignore=tests/test_integration_extraction.py

      - name: Smoke test simulator execution
        run: |
          python - <<'PY'
          from src.simulation.bracket import ChampionsLeagueTournamentSimulator

          sim = ChampionsLeagueTournamentSimulator(
              model_dir="models",
              features_dir="data",
              num_simulations=5,
          )
          sim.run_simulation()
          print("Simulation smoke test passed")
          PY

  cd:
    name: CD - Package Artifacts
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create release bundle
        run: |
          mkdir -p dist
          tar -czf dist/champions-league-predictor-${{ github.sha }}.tar.gz \
            app.py \
            requirements.txt \
            README.md \
            src \
            data \
            models \
            results

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: champions-league-predictor-${{ github.sha }}
          path: dist/champions-league-predictor-${{ github.sha }}.tar.gz
          if-no-files-found: error
